{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear nueva cuenta - Andrea Jiménez</title>
    <link rel="icon" href="{% static 'img/favicon-round.png' %}" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/registro.css' %}">
</head>

<body>

    <header class="logo">
        <img src="{% static 'img/logo.jpg' %}" alt="Logo Andrea Jiménez">
    </header>

    <main>
        <h1>Crear nueva cuenta</h1>
        <p class="registro-subtitle">Únete a nuestra comunidad</p>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <p class="{{ message.tags }}">{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="input-group">
                <i class="fa-regular fa-user"></i>
                <input type="text" name="nombre" placeholder="Nombre completo" required>
            </div>

            <div class="input-group">
                <i class="fa-regular fa-envelope"></i>
                <input type="email" name="email" placeholder="Correo electrónico" required>
            </div>

            <div class="form-divider"></div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="password1" placeholder="Contraseña" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-shield-halved"></i>
                <input type="password" name="password2" placeholder="Confirmar contraseña" required>
            </div>

            <div class="form-divider"></div>

            <div class="input-group">
                <i class="fa-solid fa-location-dot"></i>
                <input type="text" name="direccion" placeholder="Dirección" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-phone"></i>
                <input type="text" name="telefono" placeholder="Teléfono" required>
            </div>

            <button type="submit"><i class="fa-solid fa-user-plus"></i> Crear cuenta</button>
        </form>

        <p class="login-link">
            ¿Ya tienes una cuenta?
            <a href="{% url 'login' %}">Inicia sesión</a>
        </p>
    </main>

    <footer>
        <p>www.andreajimenez.com</p>
    </footer>

</body>
</html>
