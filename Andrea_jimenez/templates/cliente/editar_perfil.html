{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Perfil - Andrea Jiménez</title>
    <link rel="icon" href="{% static 'img/favicon-round.png' %}" type="image/png">
    <link rel="stylesheet" href="{% static 'css/editar_perfil.css' %}">
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'home' %}">Inicio</a>
            <a href="{% url 'perfil_cliente' %}">Mi Perfil</a>
            <a href="{% url 'carrito' %}">Carrito</a>
            <a href="{% url 'mis_ventas' %}">Mis Compras</a>
            <a href="{% url 'logout' %}">Cerrar Sesión</a>
        </nav>
    </header>

    <main class="container">
        <h1>Editar Perfil</h1>

        {% if cliente %}
        <div class="editar-perfil-container">
            <form method="POST" action="{% url 'editar_perfil' %}">
                {% csrf_token %}
                
                <label for="first_name">Nombre</label>
                <input type="text" id="first_name" name="first_name" value="{{ cliente.user.first_name }}" required>

                <label for="last_name">Apellido</label>
                <input type="text" id="last_name" name="last_name" value="{{ cliente.user.last_name }}" required>

                <label for="email">Correo</label>
                <input type="email" id="email" name="email" value="{{ cliente.user.email }}" required>

                <label for="telefono">Teléfono</label>
                <input type="text" id="telefono" name="telefono" value="{{ cliente.telefono }}">

                <label for="direccion">Dirección</label>
                <textarea id="direccion" name="direccion">{{ cliente.direccion }}</textarea>

                <button type="submit" class="guardar">Guardar Cambios</button>
            </form>
        </div>
        {% else %}
            <p class="empty-message">No se encontró información del perfil.</p>
        {% endif %}
    </main>
</body>
</html>
