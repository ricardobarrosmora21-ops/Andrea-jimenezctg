services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=andrea_jimenez
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=riki123
    expose:
      - "5432"

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             gunicorn --bind 0.0.0.0:8000 Andrea_jimenez.wsgi:application"
    volumes:
      - .:/app
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - DB_HOST=db
    depends_on:
      - db
    env_file:
      - .env

volumes:
  postgres_data:
  media_volume:
